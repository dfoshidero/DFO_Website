<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal site of Daniel Favour Oshidero — software engineer and computer scientist. Projects, experience, and ways to get in touch.">
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico">
  <link rel="icon" href="./favicon.png">
  <title>DFO</title>

  <!-- Theme bootstrap: keep in sync with getInitialTheme() in src/utils/theme.js -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      } catch (e) { /* ignore */ }
    })();
  </script>

  <style>
    body {
      opacity: 0;
      animation: fadeInAnimation ease 1s;
      animation-delay: 1s;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
    }

    html {
      animation: fadeInAnimation ease 1s;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
    }

    @keyframes fadeInAnimation {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <form name="painting-inquiry" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="painting" />
    <input type="text" name="budget" />
    <textarea name="message"></textarea>
  </form>
  <noscript>You need JavaScript to run this page.</noscript>
  <div id="root"></div>
</body>

</html>
